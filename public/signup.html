<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0d0e14" />
    <meta name="description" content="GGE Bot – Create your account" />
    <title>GGE Bot – Sign Up</title>
    <link rel="icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
    <script src="js/signup.js"></script>
</head>

<body>
<div class="front-panel-anchor">
    <div class="front-panel">
        <!-- Top nav -->
        <div class="banner">
            <span style="font-size:13px;font-weight:600;color:#8b8fa8;letter-spacing:0.04em;text-transform:uppercase;">GGE BOT</span>
            <a href="signin.html">Sign In</a>
        </div>

        <!-- Logo -->
        <img src="logo192.png" class="ashes-logo" alt="GGE Bot Logo">

        <!-- Heading -->
        <p class="panel-title">Create account</p>
        <p class="panel-subtitle">Enter your token to get started</p>

        <!-- Signup Form -->
        <form id="signup-form">
            <div class="input-field-container">
                <div class="login-info-banner" id="login-info-banner"></div>

                <li>
                    <input
                        type="text"
                        class="input-field"
                        id="username"
                        placeholder="Username"
                        autocomplete="username"
                        spellcheck="false"
                    >
                </li>
                <li>
                    <input
                        type="password"
                        class="input-field"
                        id="password"
                        placeholder="Password"
                        autocomplete="new-password"
                    >
                </li>
                <li>
                    <input
                        type="password"
                        class="input-field"
                        id="token"
                        placeholder="Invite Token"
                        autocomplete="off"
                    >
                </li>
                <li>
                    <button type="submit" class="signin-signout" id="signup-btn">Create Account</button>
                </li>
            </div>
        </form>

        <!-- Footer -->
        <div class="footer" style="justify-content:center;">
            <a href="signin.html" style="font-size:13px;">Already have an account? <span style="color:#5d6af7;font-weight:600;">Sign in</span></a>
        </div>
    </div>
</div>

</body>
</html>
